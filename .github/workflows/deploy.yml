name: DeployBot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/itsmeethankim/deploybot-demo:latest

      - name: SSH deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app

            echo "==> Pulling newest image"
            docker compose pull

            echo "==> Writing APP_VERSION"
            touch ~/app/.env
            SHA="${{ github.sha }}"
            if grep -q '^APP_VERSION=' ~/app/.env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=$SHA/" ~/app/.env
            else
              echo "APP_VERSION=$SHA" >> ~/app/.env
            fi

            echo "==> Recreate containers (clean deploy)"
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate --remove-orphans

            echo "==> Waiting for health check on host port 80 (/health)"
            sleep 2
            for i in $(seq 1 60); do
              if curl -fsS http://localhost/health > /tmp/health.json; then
                echo "✅ Healthy!"
                cat /tmp/health.json
                exit 0
              fi
              echo "Not healthy yet (attempt $i/60). Retrying..."
              sleep 1
            done

            echo "❌ Health check failed after 60s"
            docker compose ps || true
            docker compose logs --tail=200 web || true
            echo "Verbose curl:"
            curl -v http://localhost/health || true
            exit 1

      - name: Deploy summary
        if: always()
        run: |
          echo "### 🚀 DeployBot Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Server: \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard: http://${{ secrets.EC2_HOST }}/" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://${{ secrets.EC2_HOST }}/health" >> $GITHUB_STEP_SUMMARY