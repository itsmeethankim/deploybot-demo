name: DeployBot

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/itsmeethankim/deploybot-demo:latest

      - name: SSH deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            touch ~/app/.env

            docker compose pull

            if grep -q '^APP_VERSION=' ~/app/.env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=$GITHUB_SHA/" ~/app/.env
            else
              echo "APP_VERSION=$GITHUB_SHA" >> ~/app/.env
            fi

            docker compose up -d

            echo "Waiting for health check..."
            for i in $(seq 1 60); do
              # Try container port first, then host-mapped port
              if curl -fsS http://localhost:3000/health > /dev/null; then
                echo "✅ Healthy on 3000!"
                exit 0
              fi
              if curl -fsS http://localhost/health > /dev/null; then
                echo "✅ Healthy on 80!"
                exit 0
              fi
              echo "Not healthy yet (attempt $i/60). Retrying..."
              sleep 1
            done

            echo "❌ Health check failed after 60s"
            docker compose ps || true
            docker compose logs --tail=200 web || true
            exit 1